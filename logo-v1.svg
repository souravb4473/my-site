<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 80"
     role="img" aria-label="Sourav Bhattacharya Photography">
  <title>Sourav Bhattacharya Photography</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400&amp;display=swap');
      svg { color: #eae6df; }
      .m  { stroke: #c4a05a; fill: none; stroke-width: 1.3; stroke-linecap: butt; stroke-linejoin: miter; }
      .md { fill: #c4a05a; }
      .ms { stroke: #2e2e2b; stroke-width: 1; }
      .wn { font-family: 'Inter', system-ui, -apple-system, sans-serif;
            font-weight: 300; font-size: 10.5px; letter-spacing: 2.4px;
            fill: currentColor; }
      .wp { font-family: 'Inter', system-ui, -apple-system, sans-serif;
            font-weight: 400; font-size: 7px; letter-spacing: 3px;
            fill: #c4a05a; }
    </style>
  </defs>

  <!-- ── MARK ── centered at (40, 40) in 80×80 ── -->
  <!-- Outer circle -->
  <circle cx="40" cy="40" r="27" class="m"/>

  <!-- Focus-bracket corners — each arm is 7 px -->
  <!-- top-left  --> <polyline points="24,31 24,24 31,24" class="m"/>
  <!-- top-right --> <polyline points="49,24 56,24 56,31" class="m"/>
  <!-- bot-left  --> <polyline points="24,49 24,56 31,56" class="m"/>
  <!-- bot-right --> <polyline points="49,56 56,56 56,49" class="m"/>

  <!-- Centre dot -->
  <circle cx="40" cy="40" r="1.5" class="md"/>

  <!-- ── DIVIDER ── -->
  <line x1="88" y1="24" x2="88" y2="56" class="ms"/>

  <!-- ── WORDMARK ── -->
  <text x="100" y="36" class="wn">SOURAV BHATTACHARYA</text>
  <text x="100" y="52" class="wp">PHOTOGRAPHY</text>

</svg>
